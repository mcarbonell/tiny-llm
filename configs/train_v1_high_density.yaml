# =====================================================
# 🧠 TinyThinker V1 — High Density Reasoning
# Configuración para modelo de ~78M parámetros
# Optimizado para Radeon 780M con Flash Attention
# =====================================================

# --- Arquitectura del Modelo ---
dim: 512
n_layers: 12
n_heads: 8
n_kv_heads: 4
vocab_size: 16384
max_seq_len: 1024

# --- Entrenamiento ---
batch_size: 4
seq_len: 1024
max_iters: 20000
learning_rate: 0.0005
min_lr: 0.00001
warmup_iters: 500
eval_interval: 250
eval_iters: 20
weight_decay: 0.1
grad_clip: 1.0
grad_accum_steps: 16
use_gradient_checkpointing: true

# --- Rutas y Trazabilidad ---
data_path: data/train_v1.bin
tokenizer_path: model/tokenizer_v1.json
checkpoint_dir: checkpoints
arch: dense
device: dml
